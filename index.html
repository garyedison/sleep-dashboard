<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleep Product Intelligence</title>
<style>
:root {
  --bg-deep: #0b0e1a;
  --bg-panel: #111527;
  --bg-card: #171c33;
  --border: #252b4a;
  --border-glow: #3d4580;
  --text-primary: #e8e6f0;
  --text-secondary: #9094b8;
  --text-muted: #5d6183;
  --accent: #f0a830;
  --success: #3cda8f;
  --danger: #f0564a;
  --info: #5e8cf7;
  --purple: #a07cf7;
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg-deep); color:var(--text-primary); font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; }
header { padding:20px 32px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); background:rgba(17,21,39,0.9); position:sticky; top:0; z-index:100; }
.logo-area { display:flex; align-items:center; gap:14px; }
.logo-icon { width:40px; height:40px; background:linear-gradient(135deg,var(--accent),#e87e20); border-radius:10px; display:grid; place-items:center; font-size:20px; }
.logo-text h1 { font-size:20px; font-weight:800; color:var(--text-primary); }
.logo-text span { font-size:11px; color:var(--text-muted); letter-spacing:2px; text-transform:uppercase; }
.brand-badges { display:flex; gap:8px; }
.badge { padding:5px 12px; border-radius:20px; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
.badge-zpods { background:rgba(94,140,247,0.15); color:var(--info); border:1px solid rgba(94,140,247,0.3); }
.badge-ozi { background:rgba(160,124,247,0.15); color:var(--purple); border:1px solid rgba(160,124,247,0.3); }
.main-content { padding:28px 32px; max-width:1600px; margin:0 auto; }
.tab-bar { display:flex; gap:4px; background:var(--bg-panel); padding:5px; border-radius:12px; margin-bottom:28px; border:1px solid var(--border); overflow-x:auto; }
.tab { padding:10px 20px; border-radius:8px; font-size:13px; font-weight:500; color:var(--text-secondary); cursor:pointer; border:none; background:none; font-family:inherit; white-space:nowrap; }
.tab:hover { color:var(--text-primary); background:rgba(255,255,255,0.04); }
.tab.active { background:var(--bg-card); color:var(--accent); box-shadow:0 2px 12px rgba(0,0,0,0.3); }
.search-area { display:flex; gap:10px; margin-bottom:24px; }
.search-input { flex:1; padding:12px 16px; border-radius:var(--radius); border:1px solid var(--border); background:var(--bg-panel); color:var(--text-primary); font-size:14px; font-family:inherit; outline:none; }
.search-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(240,168,48,0.15); }
.search-input::placeholder { color:var(--text-muted); }
.search-btn { padding:12px 24px; background:linear-gradient(135deg,var(--accent),#e87e20); border:none; border-radius:var(--radius); color:#0b0e1a; font-weight:700; font-size:14px; cursor:pointer; font-family:inherit; }
.search-btn:hover { box-shadow:0 4px 20px rgba(240,168,48,0.4); }
.filter-row { display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; }
.filter-chip { padding:7px 14px; border-radius:20px; border:1px solid var(--border); background:var(--bg-panel); color:var(--text-secondary); font-size:12px; font-weight:500; cursor:pointer; font-family:inherit; }
.filter-chip:hover,.filter-chip.active { border-color:var(--accent); color:var(--accent); background:rgba(240,168,48,0.1); }
.stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; margin-bottom:28px; }
.stat-card { background:var(--bg-panel); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; position:relative; overflow:hidden; }
.stat-card::after { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
.stat-card:nth-child(1)::after { background:linear-gradient(90deg,var(--accent),transparent); }
.stat-card:nth-child(2)::after { background:linear-gradient(90deg,var(--info),transparent); }
.stat-card:nth-child(3)::after { background:linear-gradient(90deg,var(--success),transparent); }
.stat-card:nth-child(4)::after { background:linear-gradient(90deg,var(--purple),transparent); }
.stat-label { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:6px; }
.stat-value { font-size:26px; font-weight:800; }
.stat-sub { font-size:12px; color:var(--text-secondary); margin-top:4px; }
.products-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:18px; }
.product-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; transition:all 0.3s; }
.product-card:hover { border-color:var(--border-glow); transform:translateY(-2px); box-shadow:0 4px 24px rgba(0,0,0,0.4); }
.product-img-wrap { height:190px; background:#1a1f3a; display:grid; place-items:center; overflow:hidden; position:relative; }
.product-img-wrap img { max-height:170px; max-width:90%; object-fit:contain; }
.product-rank { position:absolute; top:8px; left:8px; background:var(--accent); color:var(--bg-deep); font-weight:700; font-size:11px; padding:3px 9px; border-radius:6px; }
.product-body { padding:16px; }
.product-title { font-size:13px; font-weight:500; line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:10px; }
.product-meta { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
.product-price { font-size:20px; font-weight:800; color:var(--accent); }
.product-rating { font-size:12px; color:var(--text-secondary); }
.stars { color:var(--accent); }
.product-tags { display:flex; gap:5px; flex-wrap:wrap; margin-top:8px; }
.product-tag { font-size:10px; padding:2px 7px; border-radius:4px; background:rgba(94,140,247,0.1); color:var(--info); font-weight:500; }
.product-actions { display:flex; gap:6px; margin-top:12px; padding-top:12px; border-top:1px solid var(--border); }
.action-btn { flex:1; padding:7px; border-radius:8px; font-size:11px; font-weight:600; text-align:center; cursor:pointer; border:none; font-family:inherit; text-decoration:none; display:block; }
.btn-reviews { background:rgba(94,140,247,0.12); color:var(--info); }
.btn-reviews:hover { background:rgba(94,140,247,0.25); }
.btn-amazon { background:rgba(240,168,48,0.12); color:var(--accent); }
.btn-amazon:hover { background:rgba(240,168,48,0.25); }
.btn-save { background:rgba(60,218,143,0.12); color:var(--success); }
.btn-save:hover { background:rgba(60,218,143,0.25); }
.review-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:200; }
.review-overlay.open { display:block; }
.review-panel { position:fixed; top:0; right:0; bottom:0; width:520px; max-width:90vw; background:var(--bg-panel); border-left:1px solid var(--border); z-index:201; overflow-y:auto; padding:28px; animation:slideIn 0.3s; }
@keyframes slideIn { from{transform:translateX(100%)} to{transform:translateX(0)} }
.review-close { position:absolute; top:14px; right:14px; width:32px; height:32px; border-radius:8px; border:1px solid var(--border); background:var(--bg-card); color:var(--text-secondary); cursor:pointer; display:grid; place-items:center; font-size:16px; }
.review-close:hover { border-color:var(--danger); color:var(--danger); }
.review-item { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:12px; }
.review-stars { color:var(--accent); font-size:14px; margin-bottom:5px; }
.review-title { font-weight:700; font-size:14px; margin-bottom:6px; }
.review-body { font-size:13px; color:var(--text-secondary); line-height:1.6; }
.review-author { font-size:11px; color:var(--text-muted); margin-top:6px; }
.loading { text-align:center; padding:60px 20px; color:var(--text-muted); }
.spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 14px; }
@keyframes spin { to{transform:rotate(360deg)} }
.error-box { text-align:center; padding:40px; background:rgba(240,86,74,0.08); border:1px solid rgba(240,86,74,0.2); border-radius:var(--radius); color:var(--danger); }
.saved-empty { text-align:center; padding:80px 40px; color:var(--text-muted); }
.saved-empty .icon { font-size:48px; margin-bottom:14px; }
@media(max-width:768px) { header{padding:14px 16px;flex-direction:column;gap:10px} .main-content{padding:16px} .products-grid{grid-template-columns:1fr} .brand-badges{display:none} .review-panel{width:100%} }
</style>
</head>
<body>
<header>
  <div class="logo-area">
    <div class="logo-icon">&#127769;</div>
    <div class="logo-text"><h1>Sleep Intelligence</h1><span>Product Research Dashboard</span></div>
  </div>
  <div class="brand-badges">
    <div class="badge badge-zpods">ZPodsForSleep</div>
    <div class="badge badge-ozi">OziSleep.com</div>
  </div>
</header>
<div class="main-content">
  <div class="tab-bar">
    <button class="tab active" data-tab="bestsellers">&#127942; Best Sellers</button>
    <button class="tab" data-tab="tracking">&#128202; Sleep Trackers</button>
    <button class="tab" data-tab="sensory">&#129513; Sensory &amp; Autism</button>
    <button class="tab" data-tab="custom">&#128269; Custom Search</button>
    <button class="tab" data-tab="saved">&#128190; Saved Products</button>
  </div>
  <div class="search-area">
    <input class="search-input" id="searchInput" placeholder="Search Amazon for sleep products, trackers, weighted blankets..." />
    <button class="search-btn" id="searchBtn">Search Amazon</button>
  </div>
  <div class="filter-row" id="filterRow">
    <button class="filter-chip active" data-q="best sleep products">Top Sleep Products</button>
    <button class="filter-chip" data-q="weighted blanket kids autism">Weighted Blankets</button>
    <button class="filter-chip" data-q="sleep tracker watch">Sleep Trackers</button>
    <button class="filter-chip" data-q="white noise machine sleep">White Noise</button>
    <button class="filter-chip" data-q="sensory compression sheet kids">Sensory Sheets</button>
    <button class="filter-chip" data-q="melatonin kids sleep">Kids Melatonin</button>
    <button class="filter-chip" data-q="sleep headband bluetooth">Sleep Headbands</button>
    <button class="filter-chip" data-q="sensory toys autism calming">Sensory Calming Toys</button>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Products Found</div><div class="stat-value" id="statCount">&mdash;</div><div class="stat-sub">from current search</div></div>
    <div class="stat-card"><div class="stat-label">Avg. Price</div><div class="stat-value" id="statPrice">&mdash;</div><div class="stat-sub">across results</div></div>
    <div class="stat-card"><div class="stat-label">Avg. Rating</div><div class="stat-value" id="statRating">&mdash;</div><div class="stat-sub">customer satisfaction</div></div>
    <div class="stat-card"><div class="stat-label">Saved Items</div><div class="stat-value" id="statSaved">0</div><div class="stat-sub">in your shortlist</div></div>
  </div>
  <div id="productsContainer"><div class="loading"><div class="spinner"></div><div>Loading products...</div></div></div>
</div>
<div class="review-overlay" id="reviewOverlay">
  <div class="review-panel" id="reviewPanel">
    <button class="review-close" id="reviewClose">&#10005;</button>
    <div id="reviewContent"><div class="loading"><div class="spinner"></div><div>Loading reviews...</div></div></div>
  </div>
</div>
<script>
var state = { products: [], saved: JSON.parse(localStorage.getItem('sleepDash_saved') || '[]'), currentTab: 'bestsellers' };

async function searchProducts(query) {
  var res = await fetch('/api/search?query=' + encodeURIComponent(query));
  var data = await res.json();
  return (data && data.data && data.data.products) ? data.data.products : [];
}

async function getTopReviews(asin) {
  var res = await fetch('/api/top-reviews?asin=' + encodeURIComponent(asin));
  var data = await res.json();
  return (data && data.data && (data.data.reviews || data.data.top_reviews)) || [];
}

async function getProductReviews(asin) {
  var res = await fetch('/api/reviews?asin=' + encodeURIComponent(asin));
  var data = await res.json();
  return (data && data.data && data.data.reviews) || [];
}

function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function starsFor(r) { var n = Math.round(parseFloat(r) || 0); return '★'.repeat(Math.min(n,5)) + '☆'.repeat(Math.max(0,5-n)); }
function extractAsin(u) { var m = (u||'').match(/\/dp\/([A-Z0-9]{10})/); return m ? m[1] : ''; }

function updateStats(products) {
  document.getElementById('statCount').textContent = products.length;
  document.getElementById('statSaved').textContent = state.saved.length;
  var prices = products.map(function(p) { return parseFloat(String(p.product_price||'').replace(/[^0-9.]/g,'')); }).filter(function(n){return !isNaN(n)&&n>0});
  var ratings = products.map(function(p) { return parseFloat(p.product_star_rating||0); }).filter(function(n){return n>0});
  document.getElementById('statPrice').textContent = prices.length ? '$'+(prices.reduce(function(a,b){return a+b},0)/prices.length).toFixed(2) : '—';
  document.getElementById('statRating').textContent = ratings.length ? (ratings.reduce(function(a,b){return a+b},0)/ratings.length).toFixed(1)+' ★' : '—';
}

function renderProducts(products) {
  var c = document.getElementById('productsContainer');
  if (!products || !products.length) { c.innerHTML = '<div class="loading">No products found. Try a different search.</div>'; updateStats([]); return; }
  state.products = products;
  updateStats(products);
  var html = '<div class="products-grid">';
  for (var i = 0; i < products.length; i++) {
    var p = products[i];
    var asin = p.asin || extractAsin(p.product_url||'');
    var isSaved = state.saved.some(function(s){return s.asin===asin});
    var price = p.product_price || '—';
    var rating = p.product_star_rating || '—';
    var reviews = p.product_num_ratings || 0;
    var img = p.product_photo || p.product_main_image_url || '';
    var title = p.product_title || 'Untitled';
    var purl = p.product_url || '#';
    html += '<div class="product-card" data-asin="'+asin+'">';
    html += '<div class="product-img-wrap">';
    if(img) html += '<img src="'+esc(img)+'" alt="" loading="lazy" onerror="this.style.display=\'none\'"/>';
    html += '<div class="product-rank">#'+(i+1)+'</div></div>';
    html += '<div class="product-body">';
    html += '<div class="product-title">'+esc(title)+'</div>';
    html += '<div class="product-meta"><div class="product-price">'+esc(String(price))+'</div>';
    html += '<div class="product-rating"><span class="stars">'+starsFor(rating)+'</span> '+esc(String(rating))+' ('+Number(reviews).toLocaleString()+')</div></div>';
    html += '<div class="product-tags">';
    if(p.is_best_seller) html += '<span class="product-tag" style="background:rgba(240,168,48,0.15);color:var(--accent)">Best Seller</span>';
    if(p.is_amazon_choice) html += '<span class="product-tag" style="background:rgba(60,218,143,0.15);color:var(--success)">Amazon Choice</span>';
    if(p.is_prime) html += '<span class="product-tag">Prime</span>';
    html += '</div>';
    html += '<div class="product-actions">';
    html += '<button class="action-btn btn-reviews" onclick="openReviews(\''+asin+'\',event)">Reviews</button>';
    html += '<a class="action-btn btn-amazon" href="'+esc(purl)+'" target="_blank" onclick="event.stopPropagation()">Amazon</a>';
    html += '<button class="action-btn btn-save" onclick="toggleSave(\''+asin+'\',event)" style="'+(isSaved?'background:rgba(60,218,143,0.3)':'')+'">'+(isSaved?'✓ Saved':'Save')+'</button>';
    html += '</div></div></div>';
  }
  html += '</div>';
  c.innerHTML = html;
}

function toggleSave(asin, event) {
  if(event) event.stopPropagation();
  var idx = -1;
  for(var i=0;i<state.saved.length;i++){if(state.saved[i].asin===asin){idx=i;break;}}
  if(idx>=0) { state.saved.splice(idx,1); }
  else { var p = state.products.find(function(x){return (x.asin||extractAsin(x.product_url||''))===asin}); if(p) state.saved.push({asin:asin,product:p}); }
  localStorage.setItem('sleepDash_saved',JSON.stringify(state.saved));
  document.getElementById('statSaved').textContent = state.saved.length;
  if(state.currentTab==='saved') renderSaved(); else renderProducts(state.products);
}

function renderSaved() {
  if(!state.saved.length) { document.getElementById('productsContainer').innerHTML='<div class="saved-empty"><div class="icon">&#128190;</div><h3 style="color:var(--text-secondary);margin-bottom:8px">No saved products yet</h3><p>Click Save on any product to shortlist it for ZPodsForSleep &amp; OziSleep.</p></div>'; return; }
  renderProducts(state.saved.map(function(s){return s.product}));
}

async function openReviews(asin, event) {
  if(event) event.stopPropagation();
  document.getElementById('reviewOverlay').classList.add('open');
  document.getElementById('reviewContent').innerHTML='<div class="loading"><div class="spinner"></div><div>Loading reviews...</div></div>';
  try {
    var reviews = await getTopReviews(asin);
    if(!reviews.length) reviews = await getProductReviews(asin);
    if(!reviews.length) { document.getElementById('reviewContent').innerHTML='<h3 style="margin-bottom:12px">Reviews</h3><p style="color:var(--text-muted)">No reviews found for ASIN: '+asin+'</p>'; return; }
    var html = '<h3 style="margin-bottom:18px;font-size:18px">Top Reviews ('+reviews.length+')</h3>';
    for(var i=0;i<reviews.length;i++) {
      var r = reviews[i];
      html += '<div class="review-item">';
      html += '<div class="review-stars">'+starsFor(r.review_star_rating||r.rating||5)+'</div>';
      html += '<div class="review-title">'+esc(r.review_title||r.title||'')+'</div>';
      html += '<div class="review-body">'+esc(r.review_comment||r.review||r.body||'')+'</div>';
      html += '<div class="review-author">'+esc(r.review_author||r.author||'Anonymous')+' — '+esc(r.review_date||r.date||'')+'</div>';
      html += '</div>';
    }
    document.getElementById('reviewContent').innerHTML = html;
  } catch(err) { document.getElementById('reviewContent').innerHTML='<div class="error-box">Failed to load reviews: '+esc(err.message)+'</div>'; }
}

document.getElementById('reviewClose').addEventListener('click',function(){document.getElementById('reviewOverlay').classList.remove('open')});
document.getElementById('reviewOverlay').addEventListener('click',function(e){if(e.target===e.currentTarget)document.getElementById('reviewOverlay').classList.remove('open')});

async function doSearch(query) {
  document.getElementById('searchInput').value = query;
  document.getElementById('productsContainer').innerHTML='<div class="loading"><div class="spinner"></div><div>Searching Amazon for "'+esc(query)+'"...</div></div>';
  try { var products = await searchProducts(query); renderProducts(products); }
  catch(err) { document.getElementById('productsContainer').innerHTML='<div class="error-box">Error: '+esc(err.message)+'</div>'; }
}

var TAB_QUERIES = { bestsellers:'best selling sleep products 2025', tracking:'sleep tracker device watch', sensory:'sensory products kids autism sleep weighted', custom:null, saved:null };

document.querySelectorAll('.tab').forEach(function(tab) {
  tab.addEventListener('click',function(){
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
    tab.classList.add('active');
    state.currentTab = tab.dataset.tab;
    if(state.currentTab==='saved') renderSaved();
    else if(TAB_QUERIES[state.currentTab]) doSearch(TAB_QUERIES[state.currentTab]);
  });
});

document.getElementById('searchBtn').addEventListener('click',function(){ var q=document.getElementById('searchInput').value.trim(); if(q) doSearch(q); });
document.getElementById('searchInput').addEventListener('keydown',function(e){ if(e.key==='Enter'){var q=e.target.value.trim(); if(q) doSearch(q);} });
document.querySelectorAll('.filter-chip').forEach(function(chip){
  chip.addEventListener('click',function(){ document.querySelectorAll('.filter-chip').forEach(function(c){c.classList.remove('active')}); chip.classList.add('active'); doSearch(chip.dataset.q); });
});

document.getElementById('statSaved').textContent = state.saved.length;
doSearch('best selling sleep products 2025');
</script>
</body>
</html>
